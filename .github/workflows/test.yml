name: Test
on:
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

# Split main, libero_env, and robocasa_env into separate jobs so they don't
# compete for the same ~14 GB of runner disk space. Each job gets a fresh VM.
jobs:
  test-main:
    name: Tests (main, CPU)
    runs-on: ubuntu-24.04
    env:
      GIT_LFS_SKIP_SMUDGE: true
      # Force JAX onto CPU. The runner has no GPU; setting this explicitly
      # avoids any ambiguity and keeps `jax.device_count() == 1` so data-loader
      # tests with small batch sizes don't try to shard across multiple devices.
      JAX_PLATFORMS: cpu
    steps:
      - uses: actions/checkout@v6
        # Main openpi tests don't need libero/robocasa/robosuite submodules.

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.14"
          enable-cache: true

      - name: Install the project
        # Drop --all-extras: the `rlds` extra pulls in ~500 MB of tensorflow-cpu
        # and tensorflow-datasets that no tests actually use. Keep --dev for pytest.
        # uv will auto-install Python 3.11 per .python-version.
        run: uv sync --dev

      - name: Run main openpi tests
        run: uv run pytest --strict-markers -m "not manual"

  test-libero:
    name: Tests (libero_env, CPU)
    runs-on: ubuntu-24.04
    env:
      GIT_LFS_SKIP_SMUDGE: true
      JAX_PLATFORMS: cpu
      # Software-rendered MuJoCo via mesa's osmesa; works on CPU-only runners.
      MUJOCO_GL: osmesa
    steps:
      - uses: actions/checkout@v6
        with:
          # libero / robosuite are installed editable from third_party/.
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libosmesa6
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.14"
          enable-cache: true

      - name: Sync libero_env venv
        working-directory: examples/libero_env
        # uv will auto-download Python 3.8 per the pyproject.toml requires-python.
        run: uv sync

      - name: Run libero_env tests
        working-directory: examples/libero_env
        run: uv run pytest -v

  test-robocasa:
    name: Tests (robocasa_env, CPU)
    runs-on: ubuntu-24.04
    env:
      GIT_LFS_SKIP_SMUDGE: true
      JAX_PLATFORMS: cpu
      MUJOCO_GL: osmesa
    steps:
      - uses: actions/checkout@v6
        with:
          # robocasa / robosuite are installed editable from third_party/.
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libosmesa6
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.14"
          enable-cache: true

      - name: Sync robocasa_env venv
        working-directory: examples/robocasa_env
        run: uv sync

      - name: Run robocasa_env tests
        working-directory: examples/robocasa_env
        # The TestRobocasaEnv class is marked manual because it needs the
        # ~10 GB kitchen assets download, which is impractical for CI.
        run: uv run pytest --strict-markers -m "not manual" -v

  test-groot-env:
    name: Tests (groot_env, CPU)
    runs-on: ubuntu-24.04
    env:
      GIT_LFS_SKIP_SMUDGE: true
    steps:
      - uses: actions/checkout@v6
        with:
          # gr00t is installed editable from third_party/Isaac-GR00T.
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.14"
          enable-cache: true

      - name: Sync groot_env venv
        working-directory: groot_env
        # groot_env/pyproject.toml deliberately omits flash-attn from main deps
        # because building it needs CUDA/nvcc. CI only runs the stub-based
        # unit tests in groot_env/tests/, which don't construct the real model
        # and don't need flash-attn. Production serve-time installs follow the
        # extra `uv pip install --no-build-isolation flash-attn==2.7.1.post4`
        # step documented in groot_env/README.md.
        run: uv sync

      - name: Run groot_env tests
        working-directory: groot_env
        # test_groot_activations.py auto-skips if ACTIVATIONS_DIR isn't set
        # (it validates an already-collected activation dataset, which we
        # don't ship in CI). test_groot_adapter.py and
        # test_groot_activation_collector.py are pure unit tests and run
        # without a GPU, a checkpoint, or network access.
        run: uv run pytest -v
