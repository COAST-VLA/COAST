name: Test
on:
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

jobs:
  test:
    name: Tests (CPU, not-manual)
    runs-on: ubuntu-latest
    env:
      GIT_LFS_SKIP_SMUDGE: true
      # Force JAX onto CPU. The runner has no GPU, but conftest's auto-detect
      # depends on pynvml; setting this explicitly avoids any ambiguity and
      # also keeps `jax.device_count() == 1` so data-loader tests with small
      # batch sizes don't try to shard across multiple devices.
      JAX_PLATFORMS: cpu
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-dev libavformat-dev libavutil-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest --strict-markers -m "not manual"
