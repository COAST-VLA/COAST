name: Test
on:
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

jobs:
  test:
    name: Tests (CPU)
    runs-on: ubuntu-latest
    env:
      GIT_LFS_SKIP_SMUDGE: true
      # Force JAX onto CPU. The runner has no GPU; setting this explicitly
      # avoids any ambiguity and keeps `jax.device_count() == 1` so data-loader
      # tests with small batch sizes don't try to shard across multiple devices.
      JAX_PLATFORMS: cpu
      # Software-rendered MuJoCo via mesa's osmesa. Used by the libero_env
      # tests below; works on a CPU-only runner with libosmesa6 installed.
      MUJOCO_GL: osmesa
    steps:
      - uses: actions/checkout@v4
        with:
          # libero / robocasa / robosuite are installed editable from third_party/
          # so the libero_env and robocasa_env steps need the submodules cloned.
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libosmesa6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run main openpi tests
        run: uv run pytest --strict-markers -m "not manual"

      - name: Sync libero_env venv
        working-directory: examples/libero_env
        run: uv sync

      - name: Run libero_env tests
        working-directory: examples/libero_env
        run: uv run pytest -v

      - name: Sync robocasa_env venv
        working-directory: examples/robocasa_env
        run: uv sync

      - name: Run robocasa_env tests
        working-directory: examples/robocasa_env
        # The TestRobocasaEnv class is marked manual because it needs the
        # ~10 GB kitchen assets download, which is impractical for CI.
        run: uv run pytest --strict-markers -m "not manual" -v
